<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>휴대폰결제</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
	
	<!-- css -->
	<!-- <link rel="stylesheet" href="../css/reset.css" /> -->
	<link rel="stylesheet" href="../css/common.css" />
	<!-- <link rel="stylesheet" href="../css/pass_mobilepay.css" /> -->
	<link rel="stylesheet" href="../css/pass_mobilepay_new.css" />
</head>
<body>
	
	<div class="page_wrapper">
		<div class="page_header">
			<div class="page_title">
				<h2><span>이용내역조회</span></h2>
			</div>

			<div class="search_wrap">
				<div class="search_inner">
					<div class="period_box">
						<button type="button" class="btn-prev"><span><img src="../images/ico_l_enabled.png" alt="이전"></span></button>
						<p class="date">YYYY년 MM월</p>
						<button type="button" class="btn-next"><span><img src="../images/ico_r_enabled.png" alt="다음"></span></button>
					</div>
					<p class="pay_cnt">결제내역 9건</p>

					<div class="search_select" data-type="month">
						<div class="select_triger"><span class="type_txt">월단위</span></div>
						<div class="select_layer">
							<button type="button" class="month active" data-type="month"><span>월단위</span></button>
							<button type="button" class="custom" data-type="custom"><span>직접입력</span></button>
						</div>
					</div>
					<!-- // search_select -->
				</div>
				<!-- // search_inner -->
			</div>
			<!-- // search_wrap -->
		</div>
		<!-- // page_header -->

		<div class="page_content err_con">
			
			<div class="error">
				<div class="img"><img src="../images/ico_empty.png" alt="아이콘"></div>
				<div class="tit">이용 내역이 없습니다.</div>
			</div>

		</div>
		<!-- // page_content -->
	</div>
	<!-- // page_wrapper -->



</body>

</html>
