<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>휴대폰결제</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
	
	<!-- css -->
	<!-- <link rel="stylesheet" href="../css/reset.css" /> -->
	<link rel="stylesheet" href="../css/common.css" />
	<!-- <link rel="stylesheet" href="../css/pass_mobilepay.css" /> -->
	<link rel="stylesheet" href="../css/pass_mobilepay_new.css" />
</head>
<body>
	
	<div class="page-wrapper">
		<!-- header -->
		<div class="header_temp">
			<div class="temp">
				<button type="button" class="bnt_prev"><span><img src="../images/btn_top_back.png" alt="이전"></span></button>
				<!-- <h1>휴대폰결제</h1>
				<h1><img src="../images/ico_logo_main.png" alt="PASS"></h1>
				<button type="button" class="bnt_close"><span><img src="../images/btn_top_close.png" alt="이전"></span></button> -->
			</div>
			<!-- // temp 삭제 -->
		</div>
		<!-- /header -->

		<div class="container">
			<div class="page_title_wrap">
				<h2 class="title">
					현재 비밀번호 3자리 숫자를 <br />
					입력 해주세요
				</h2>
			</div>
			<!-- // page_title_wrap -->

			<div class="new_pw_wrap">
				<div class="pw_num">
					<label for="">
						<input type="text" class="input-element" maxlength="1">
						<span class="mark"></span>
					</label>
				</div>
				<div class="pw_num">
					<label for="">
						<input type="text" class="input-element" maxlength="1">
						<span class="mark"></span>
					</label>
				</div>
				<div class="pw_num">
					<label for="">
						<input type="text" class="input-element" maxlength="1">
						<span class="mark"></span>
					</label>
				</div>
				<button type="button" class="pw_visibility_toggle">
					<span>
						<img class="ico_show" src="../images/ico_number_visibility.png" alt="비밀번호보기" style="display:none;" />
						<img class="ico_hide" src="../images/ico_number_hidden.png" alt="비밀번호가리기" />
					</span>
				</button>
			</div>

	
			<div class="page_bottom_wrap">
				<div class="btn_group">
					<button type="button" class="btn_next" disabled><span class="txt">다음</span></button>
					<!-- <button type="button" class="btn_cancel"><span class="txt">홈으로</span></button> -->
				</div>
			</div>
			<!-- // page_bottom_wrap -->

			
		</div><!-- /container -->
	</div>
	<!-- // page-wrapper -->


<script>
(function () {
  const pwWrap     = document.querySelector('.new_pw_wrap');
  const pwNums     = Array.from(document.querySelectorAll('.pw_num'));
  const inputs     = pwNums.map(el => el.querySelector('input.input-element'));
  const marks      = pwNums.map(el => el.querySelector('span.mark'));
  const toggleBtn  = document.querySelector('.pw_visibility_toggle');
  const icoShow    = toggleBtn.querySelector('.ico_show');
  const icoHide    = toggleBtn.querySelector('.ico_hide');
  const btnNext    = document.querySelector('.btn_next');

  let isVisible = false;   // 현재 비밀번호 표시 여부

  /* ──────────────────────────────────────────
   * 유틸: 첫 번째 빈 칸 인덱스 반환
   *   전부 채워진 경우 마지막 인덱스 반환
   * ────────────────────────────────────────── */
  function getNextEmptyIndex() {
    const idx = inputs.findIndex(inp => inp.value === '');
    return idx === -1 ? inputs.length - 1 : idx;
  }

  /* ──────────────────────────────────────────
   * 포커스 처리
   * ────────────────────────────────────────── */
  function focusAt(index) {
    inputs[index].focus();
  }

  /* ──────────────────────────────────────────
   * active 클래스 갱신: 값이 입력된 칸에만 적용
   * ────────────────────────────────────────── */
  function updateActiveClass() {
    pwNums.forEach((el, i) => {
      el.classList.toggle('active', inputs[i].value !== '');
    });
  }

  /* ──────────────────────────────────────────
   * 다음 버튼 활성화 여부 갱신
   * ────────────────────────────────────────── */
  function updateNextBtn() {
    const allFilled = inputs.every(inp => inp.value !== '');
    btnNext.disabled = !allFilled;
  }

  /* ──────────────────────────────────────────
   * .pw_num 영역 클릭 → 첫 번째 빈 칸으로 포커스
   * ────────────────────────────────────────── */
  pwNums.forEach((numEl) => {
    numEl.addEventListener('click', function (e) {
      // input 자체 클릭 시 중복 실행 방지
      if (e.target.tagName === 'INPUT') return;
      e.preventDefault();
      focusAt(getNextEmptyIndex());
    });
  });

  /* ──────────────────────────────────────────
   * 입력 이벤트: 값 입력 후 다음 칸으로 이동
   * ────────────────────────────────────────── */
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', function () {
      // 숫자만 허용
      this.value = this.value.replace(/[^0-9]/g, '').slice(0, 1);

      updateActiveClass();
      updateNextBtn();

      if (this.value !== '' && i < inputs.length - 1) {
        focusAt(i + 1);
      }
    });

    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace') {
        if (this.value === '' && i > 0) {
          // 현재 칸이 비어있으면 앞 칸으로 이동 후 지우기
          inputs[i - 1].value = '';
          focusAt(i - 1);
        } else {
          this.value = '';
        }
        updateActiveClass();
        updateNextBtn();
        e.preventDefault();
      }
    });
  });

  /* ──────────────────────────────────────────
   * 토글 버튼: 비밀번호 표시 / 숨김 전환
   * ────────────────────────────────────────── */
  toggleBtn.addEventListener('click', function () {
    isVisible = !isVisible;
    pwWrap.classList.toggle('show-pw', isVisible);

    // 입력 타입 전환 (show 모드: text / hide 모드: text + mark로 마스킹)
    // → 타입은 그대로 두고 CSS show-pw 클래스로 색상 처리
    // 이미지 교체
    icoShow.style.display = isVisible ? ''      : 'none';
    icoHide.style.display = isVisible ? 'none'  : '';

    // 포커스 복원
    focusAt(getNextEmptyIndex());
  });

  /* ──────────────────────────────────────────
   * 초기화
   * ────────────────────────────────────────── */
  updateActiveClass();
  // 자동 포커스가 필요한 경우 아래 주석 해제
  // focusAt(0);

})();
</script>

</body>

</html>
