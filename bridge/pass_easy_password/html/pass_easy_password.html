<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>쉬운화면 비밀번호 변경</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400..700&display=block" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../css/pass_easy_password.css" />
</head>
<body>

	<div class="header_wrap">
		<div class="temp">
			<!-- <button type="button"><span><img src="../images/btn_top_back.png" alt="이전"></span></button> -->
			<h1>비밀번호 변경</h1>
			<button type="button" class="btn_close"><span><img src="../images/btn_top_close.svg" alt="닫기"></span></button>
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->



	<div class="pass_easy_password_info_wrap">
		<div class="info_content">
		
			<div class="pass_easy_info">
				<div class="img"><img src="../images/img_password.png" alt=""></div>
				<p class="txt">안전한 이용을 위해 <br>기존 비밀번호 확인이 필요합니다.</p>
			</div>
			<!-- // pass_easy_info -->

			<div class="pass_easy_alert">
				<div class="title"><strong>비밀번호 변경 전 확인해주세요</strong></div>
				<ul class="pass_easy_alert_list">
					<li><p>비밀번호 변경 중 앱을 강제 종료하면 <br />기존 비밀번호 정보가 초기화될 수 있습니다.</p></li>
					<li><p>해당 비밀번호는 PASS 앱 이용 및 간편본인 확인시 <br />사용됩니다.</p></li>
					<li><p>PASS 인증서 비밀번호는 PASS 앱 비밀번호와 별도로 <br />설정 및 관리해야 합니다.</p></li>
					<li><p>PASS 인증서 비밀번호는 현재 숫자 6자리로 제공되며, <br />지문인식 등 생체인증 방식은 추후 제공될 예정입니다.</p></li>
				</ul>
			</div>
			
		</div>
		<!-- // info_content -->


		<div class="pass_easy_password_info_footer">
			<button type="button"><span>확인</span></button>
		</div>
		<!-- // pass_easy_password_info_footer -->
	</div>
	<!-- // pass_easy_password_info_wrap -->
					

</body>
</html>
