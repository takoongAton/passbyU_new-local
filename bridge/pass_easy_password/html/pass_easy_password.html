<!DOCTYPE html>
<html lang="ko">
	<head>
	<title>쉬운화면 비밀번호 변경</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	
	<!-- font -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400..700&display=swap" rel="stylesheet" />
	
	<!-- css -->
	<link rel="stylesheet" href="../css/pass_easy_password.css" />
<style>
.pass_easy_password_info_wrap {max-width:720px; margin:0 auto;}
.pass_easy_password_info_wrap .info_content {display:flex; flex-direction:column; gap:48px 0; margin-top:36px; padding:0 18px;}

.pass_easy_password_info_wrap .pass_easy_info {display:flex; flex-direction:column; justify-content: center; align-items:center; gap:16px 0;}
.pass_easy_password_info_wrap .pass_easy_info div.img img {display:inline-block; width:auto; height:88px;}
.pass_easy_password_info_wrap .pass_easy_info p.txt {color: #000; text-align: center; font-family: "Noto Sans KR"; font-size: 18px; font-style: normal; font-weight: 500; line-height: 28px; /* 155.556% */ letter-spacing: -0.45px;}

.pass_easy_password_info_wrap .pass_easy_alert {display:flex; flex-direction:column; gap:18px 0;}
.pass_easy_password_info_wrap .pass_easy_alert .title {padding:4px 0; border-bottom:1px solid #ddd}
.pass_easy_password_info_wrap .pass_easy_alert .title strong {display:block; color: #000; font-family: "Noto Sans KR"; font-size: 16px; font-style: normal; font-weight: 700; line-height: 26px; /* 162.5% */ letter-spacing: -0.4px;}
.pass_easy_password_info_wrap .pass_easy_alert .pass_easy_alert_list {display:flex; flex-direction:column; gap:6px 0;}
.pass_easy_password_info_wrap .pass_easy_alert .pass_easy_alert_list li p {position:relative; padding-left:0.75em; color: #888; font-family: "Noto Sans KR"; font-size: 14px; font-style: normal; font-weight: 400; line-height: normal; letter-spacing: -0.35px;}
.pass_easy_password_info_wrap .pass_easy_alert .pass_easy_alert_list li p:before {content:"·"; display:block; position:absolute; top:0; left:0; font-size:inherit; line-height:inherit;}

.pass_easy_password_info_footer {position:fixed; bottom:0; left:0; right:0; width:100%; max-width:720px; margin:0 auto; padding-bottom:env(safe-area-inset-bottom); background-color:#333;}
.pass_easy_password_info_footer button {width:100%; height:48px; padding:13px 0 12px 0;}
.pass_easy_password_info_footer button span {display:block; color:#fff; font-size:16px; line-height:1em; color: #FFF; text-align: center; font-family: "Noto Sans KR"; font-size: 16px; font-style: normal; font-weight: 400; line-height: normal; letter-spacing: -0.4px;}
</style>
</head>
<body>

	<div class="header_wrap">
		<div class="temp">
			<button type="button"><span><img src="../images/btn_top_back.png" alt="이전"></span></button>
			<h1>쉬운화면 비밀번호 변경</h1>
			<button type="button" class="btn_close"><span><img src="../images/btn_top_close.svg" alt="닫기"></span></button>
		</div>
		<!-- // temp 삭제 -->
	</div>
	<!-- // header_wrap -->



	<div class="pass_easy_password_info_wrap">
		<div class="info_content">
		
			<div class="pass_easy_info">
				<div class="img"><img src="../images/img_password.png" alt=""></div>
				<p class="txt">안전한 이용을 위해 <br>기존 비밀번호 확인이 필요합니다.</p>
			</div>
			<!-- // pass_easy_info -->

			<div class="pass_easy_alert">
				<div class="title"><strong>비밀번호 변경 전 확인해주세요</strong></div>
				<ul class="pass_easy_alert_list">
					<li><p>비밀번호 변경 중 앱을 강제 종료하면 기존 비밀번호 정보가 초기화될 수 있습니다.</p></li>
					<li><p>해당 비밀번호는 PASS 앱 이용 및 간편본인 확인시 사용됩니다.</p></li>
					<li><p>PASS 인증서 비밀번호는 PASS 앱 비밀번호와 별도로 설정 및 관리해야 합니다.</p></li>
					<li><p>PASS 인증서 비밀번호는 현재 숫자 6자리로 제공되며, 지문인식 등 생체인증 방식은 추후 제공될 예정입니다.</p></li>
				</ul>
			</div>
			
		</div>
		<!-- // info_content -->


		<div class="pass_easy_password_info_footer">
			<button type="button"><span>확인</span></button>
		</div>
		<!-- // pass_easy_password_info_footer -->
	</div>
	<!-- // pass_easy_password_info_wrap -->
					

</body>
</html>
